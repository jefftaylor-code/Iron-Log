<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Iron Log"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Iron Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0d0f;--bg2:#111114;--bg3:#141416;--border:#1e1e24;--border2:#2a2a30;--text:#fff;--text2:#888;--text3:#444;--success:#3DBF7F;--warn:#F5A623;--danger:#E05C5C;--info:#4F8EF7}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none}
    select,input,button{font-family:'DM Sans',sans-serif}
    select{appearance:none;-webkit-appearance:none}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    #app{padding-bottom:90px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 16px 8px}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:5px;line-height:1}
    .header-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:3px;text-transform:uppercase}
    .date-badge{text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:6px 14px}
    .date-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
    .date-mon{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:1px}
    .day-pill{margin:0 16px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
    .row-list{padding:0 10px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeIn 0.2s ease}
    .card-bar{display:flex;align-items:center;gap:6px;padding:8px 10px}
    .card-index{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
    .card-title{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px;min-width:0}
    .card-title strong{color:var(--text);font-weight:600}
    .card-title .ph{color:var(--text3)}
    .prog-pill{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;flex-shrink:0}
    .tip-btn{background:none;border:1px solid;border-radius:6px;font-size:13px;padding:2px 6px;cursor:pointer;flex-shrink:0}
    .sync-badge{font-size:9px;color:var(--success);background:#1a3a1a;padding:2px 5px;border-radius:4px;flex-shrink:0}
    .remove-btn{background:none;border:none;color:#333;cursor:pointer;font-size:15px;padding:2px 4px;flex-shrink:0}
    .card-body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:9px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .field-wrap{display:flex;flex-direction:column;gap:3px}
    .field-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-weight:700;text-transform:uppercase}
    .sel-wrap{position:relative}
    .sel-wrap select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;padding:7px 22px 7px 8px;cursor:pointer}
    .sel-wrap select:disabled{opacity:0.35;cursor:not-allowed}
    .sel-arrow{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
    .custom-input{margin-top:5px;width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;padding:7px 8px;outline:none}
    /* target badge */
    .target-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;text-align:center}
    .target-badge span{color:var(--text2)}
    /* rest */
    .rest-row{display:flex;align-items:center;gap:7px}
    .rest-btns{display:flex;gap:4px;flex:1}
    .rest-btn{flex:1;border:1px solid;border-radius:6px;font-size:11px;font-weight:700;padding:6px 0;cursor:pointer;letter-spacing:0.3px}
    /* sets - compact mobile layout */
    .sets-wrap{display:flex;flex-direction:column;gap:6px}
    .set-block{border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:opacity 0.2s}
    .set-block.done{border-color:var(--success);border-left:3px solid var(--success);}
    .set-top{display:flex;align-items:stretch}
    .set-num{width:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
    .set-inputs{display:flex;flex:1;min-width:0}
    .set-field{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--border);min-width:0}
    .set-field-lbl{font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:3px 6px 0;font-weight:700}
    .set-input{width:100%;background:transparent;border:none;color:var(--text);font-size:17px;font-weight:600;padding:1px 6px 5px;text-align:center;outline:none;min-width:0}
    .set-input-done{color:var(--text3);border-bottom:1px solid var(--success);}
    .set-done-strip{border-top:1px solid var(--border);display:flex}
    .done-btn{flex:1;background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.8px;padding:7px 8px;text-transform:uppercase;transition:background 0.15s,color 0.15s;text-align:center}
    .notes-input{background:transparent;border:none;border-top:1px solid var(--border);color:var(--text3);font-size:11px;padding:8px 0 0;outline:none;width:100%}
    .notes-input::placeholder{color:#222}
    .add-btn{display:block;width:calc(100% - 20px);margin:12px 10px 0;background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;color:var(--text3);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;padding:13px;cursor:pointer}
    .sync-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;z-index:100}
    .sync-info{font-size:12px}
    .sync-btn{border:1px solid;border-radius:9px;font-size:12px;font-weight:700;padding:9px 16px;cursor:pointer;letter-spacing:0.5px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;animation:fadeIn 0.15s ease}
    .timer-box{background:var(--bg2);border:1px solid var(--border2);border-radius:22px;padding:28px 40px;text-align:center;animation:slideUp 0.2s ease}
    .timer-lbl{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;max-width:220px}
    .timer-sub{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin:10px 0 18px}
    .timer-dismiss{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:10px 26px;border-radius:9px;cursor:pointer;font-size:11px;letter-spacing:2px;font-weight:700}
    .tip-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;animation:slideUp 0.2s ease}
    .tip-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
    .tip-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
    .tip-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1}
    .tip-loading{display:flex;flex-direction:column;align-items:center;padding:40px}
    .spinner{width:32px;height:32px;border:3px solid var(--border2);border-top:3px solid var(--info);border-radius:50%;animation:spin 0.8s linear infinite}
    .tip-loading p{color:var(--text3);font-size:12px;margin-top:10px}
    .tip-emoji{padding:20px;text-align:center;font-size:48px;background:var(--bg)}
    .tip-img-wrap{display:flex;justify-content:center;padding:14px 14px 0;background:var(--bg)}
    .tip-img{width:100%;max-width:260px;border-radius:10px}
    .tip-content{padding:12px 14px 18px;display:flex;flex-direction:column;gap:9px}
    .tip-line{display:flex;gap:8px;font-size:13px;color:#ccc;line-height:1.55}
    .tip-bullet{color:var(--info);font-weight:700;flex-shrink:0;font-size:14px;margin-top:2px}
  </style>
</head>

<div id="app">

<div class="overlay" id="timerOverlay" style="display:none" onclick="cancelTimer()">

      <circle cx="70" cy="70" r="60" fill="none" stroke="#1e1e24" stroke-width="9"/>

        stroke-dasharray="376.99" stroke-dashoffset="0" stroke-linecap="round"
        style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear,stroke 0.5s"/>
      <text x="70" y="78" text-anchor="middle" fill="white" font-size="34" font-family="Bebas Neue" letter-spacing="2" id="timerText">0:00</text>
    </svg>
    <div class="timer-sub" id="timerSub">RESTING</div>
    <button class="timer-dismiss" onclick="cancelTimer()">DISMISS</button>
  </div>
</div>
<div class="overlay" id="tipOverlay" style="display:none" onclick="closeTip()">
  <div class="tip-box" onclick="event.stopPropagation()">
    <div class="tip-header"><div class="tip-ttl" id="tipTitle"></div><button class="tip-close" onclick="closeTip()">×</button></div>

// Built-in technique tips
var TIPS={};
TIPS["Chest Press Machine"]=["Sit tall with lower back against the pad. Set grip at mid-chest height — not too high or you stress the shoulder joint.","Push straight out and slightly together, exhaling on the push. Squeeze the chest at full extension for 1 second.","Avoid letting elbows flare wide past 45 degrees. This is the most common cause of shoulder impingement after 50.","Control the return slowly over 2-3 seconds. Resisting the weight on the way back is where you build the most muscle."];
TIPS["Incline Dumbbell Press"]=["Set bench at 30-45 degrees. Lie back so your eyes are under the dumbbells, feet flat on the floor.","Lower dumbbells to the upper chest with elbows at about 60 degrees from your torso — not flared out to 90.","Press up and slightly inward, bringing dumbbells close at the top without clashing them together.","Never lower past the point where elbows go below the bench. Stop at chest level to protect the shoulder."];
TIPS["Shoulder Press Machine"]=["Adjust seat so handles are at upper-chest height, not above your head. Starting too high compresses the shoulder.","Press straight up, keeping core braced and lower back neutral against the pad.","Stop just short of locking out at the top — this keeps tension on the muscle and reduces joint stress.","Control the descent and stop when elbows are at 90 degrees. Going lower adds rotator cuff strain."];
TIPS["Lateral Raise (Dumbbells)"]=["Stand with a slight bend in elbows, palms facing down. Lean very slightly forward from the hips.","Raise to shoulder height only — no higher. Lifting past parallel puts unnecessary strain on the AC joint.","Lead with your elbows, not your wrists. Think of pouring a glass of water at the top — slight thumb-down rotation.","Use lighter weight with strict form. Cheating with momentum here is the number one cause of shoulder injury in this movement."];
TIPS["Tricep Pushdown (Cable)"]=["Set cable high. Stand close, elbows pinned to your sides at about 90 degrees. Keep elbows stationary throughout.","Push straight down until arms are fully extended, squeezing the tricep hard at the bottom.","Control the return — let the cable pull hands only up to 90 degrees, not higher, to keep tension on the triceps.","Avoid leaning too far forward or using body weight. Keep chest up and core braced throughout."];
TIPS["Overhead Tricep Extension"]=["Keep elbows pointing forward and close to your head throughout — only the forearm moves.","Extend fully, then return slowly. Upper arms stay vertical and still — this is the key cue.","Men over 50 should be cautious if there is any elbow discomfort. Try a rope attachment for a more natural arc.","Use moderate weight. This is a stretch-position exercise — the tricep is most vulnerable to strain when fully stretched."];
TIPS["Lat Pulldown"]=["Grip slightly wider than shoulder-width. Lean back just 10-15 degrees and keep your chest tall.","Pull to your upper chest, driving your elbows down and back. Think of putting your elbows into your back pockets.","Avoid pulling behind the neck — this is hard on the cervical spine and offers no advantage.","Control the return fully. Let arms extend and lats stretch at the top before the next rep."];
TIPS["Lat Pulldown (heavy)"]=["Same mechanics as regular lat pulldown. On heavy days the key is maintaining form — no excessive lean-back.","Use lifting straps if grip gives out before your lats. Grip should never be the limiting factor.","5-6 reps heavy is ideal. Rest 2-3 minutes between sets — full recovery between sets is critical.","If you feel it in your biceps more than your lats, try a wider grip and focus on driving elbows down."];
TIPS["Seated Cable Row"]=["Sit tall with a slight natural arch in the lower back. Keep chest up — do not round when reaching forward.","Pull the handle to your lower sternum, squeezing shoulder blades together at the end. Pause 1 second.","Avoid rocking back and forth. All movement should be in the arms and shoulders — the torso stays still.","The forward reach is important — let shoulder blades protract fully before each pull."];
TIPS["Machine Row"]=["Adjust the chest pad so you can sit tall without hunching. Grip at shoulder width.","Drive elbows straight back, squeezing the mid-back at full contraction. Hold for 1 second.","Avoid shrugging your shoulders up during the pull. Keep them down and back throughout.","Ideal for men over 50 because the chest pad removes lower back stress — a key advantage over free-weight rows."];
TIPS["Machine Row (heavy)"]=["On heavy row days, set the chest pad firm against your chest for maximum back isolation.","Drive the weight back explosively, then lower under full control for 3 seconds.","6-8 reps. Heavy rows build the thick mid-back that protects your spine — one of the most important exercises over 50.","Focus on driving elbows back, not pulling with your biceps. Think of your hands as hooks."];
TIPS["Face Pulls (Cable)"]=["Set cable at upper-face height. Use a rope attachment, palms facing in. Step back far enough to load the cable.","Pull the rope to your face, separating your hands and flaring elbows high and wide — think double-bicep pose.","This exercise protects the rotator cuff — essential for men over 50. Never rush it or use heavy weight.","15+ reps with controlled form beats heavy weight here. It is a corrective exercise, not a strength move."];
TIPS["Dumbbell Curl"]=["Stand with dumbbells at sides, palms forward. Pin elbows to your sides — they should not move forward.","Curl up to shoulder height, rotating wrists slightly outward at the top for a full bicep peak contraction.","Avoid swinging your body. If leaning back, the weight is too heavy. Go lighter with strict form.","Lower slowly over 2-3 seconds. Most muscle growth happens on the lowering phase."];
TIPS["Hammer Curl"]=["Hold dumbbells with a neutral grip, palms facing each other. This also works the brachialis and forearm.","Curl straight up keeping the neutral grip throughout — do not rotate the wrist. Elbows stay pinned to your sides.","Hammer curls are easier on the wrist and elbow than supinated curls — good choice if you have any elbow tenderness.","Can be done alternating or simultaneously. Alternating allows better focus on each arm."];
TIPS["Leg Press"]=["Position feet shoulder-width apart, mid-platform. Toes slightly out. Knees should track over toes throughout.","Lower only until knees are at 90 degrees — going deeper strains the knee joint, especially with an old injury.","Never lock out your knees at the top. Keep a slight bend to protect the joint and maintain muscle tension.","If your lower back rounds off the pad at the bottom, your range is too deep — stop higher."];
TIPS["Romanian Deadlift (Dumbbells)"]=["Hold dumbbells in front of thighs, feet hip-width apart. Keep a soft bend in the knees throughout.","Hinge at the hips — push them back as you lower the dumbbells along your shins. Keep your back flat, not rounded.","Lower until you feel a strong hamstring stretch, usually mid-shin. Stop there — going lower rounds the lower back.","Drive hips forward to come up, squeezing the glutes at the top. Think hip hinge, not a squat."];
TIPS["Leg Curl Machine"]=["Adjust the pad to sit just above your heels. Lie face down with knees just off the edge of the bench.","Curl the weight up as far as possible, squeezing the hamstrings hard at the top. Pause briefly.","Control the return — do not let it snap back. A slow 2-second lowering phase is critical for hamstring development.","Avoid lifting your hips off the pad on the way up — this means the weight is too heavy."];
TIPS["Leg Extension Machine"]=["Adjust the pad to rest on your lower shins, just above the ankle. Sit with back fully against the pad.","Extend to full lockout and squeeze the quad hard for 1 second. Full extension is key for VMO activation.","If you have knee pain during this movement, reduce range of motion. Some knee conditions may contraindicate this exercise.","Lower slowly over 2-3 seconds. The slow lowering phase is where the quad does the most work."];
TIPS["Calf Raise Machine"]=["Stand with balls of your feet on the platform, shoulders under the pads. Keep a slight bend in the knees.","Lower heels as far as possible to get a full stretch at the bottom — this is key for calf development.","Rise up as high as possible onto your toes and squeeze hard at the top for 1-2 seconds.","Calves respond well to higher reps at 15-20. Control the movement — no bouncing at the bottom."];
TIPS["Hip Abductor Machine"]=["Sit with back flat against the pad. Adjust so knees and hips are at 90 degrees.","Push knees out against the pads in a controlled motion, squeezing outer glutes at full range.","Avoid tilting to one side or using momentum. This is a controlled, isolating movement.","Strengthening hip abductors reduces knee valgus (caving in) during squats and other exercises — great for knee health."];
TIPS["Plank"]=["Start on elbows and toes, body in a straight line from head to heels. No sagging hips or raised butt.","Brace your core as if about to take a punch. Squeeze glutes. Breathe normally — do not hold your breath.","If your lower back hurts, drop to your knees. Build duration gradually: 20s, 30s, 45s, 60s over weeks.","Keep your neck neutral, eyes toward the floor. Cervical alignment matters."];
TIPS["Cable Crunch"]=["Kneel facing the cable, rope at the back of your neck. Keep hips stationary throughout.","Crunch down by rounding the upper back — hips should not move. The movement is all in the abs.","Squeeze hard at the bottom, then return slowly. Avoid using hip flexors to do the work.","Keep weight moderate. This is about contraction quality, not maximum load."];
TIPS["Seated Leg Raise"]=["Sit on the edge of a bench, hands gripping the sides. Lean back slightly and extend legs out straight.","Raise legs to hip height while contracting lower abs. Do not swing — use a slow, controlled lift.","If this is too difficult, bend your knees slightly. Work toward full extension over time.","Exhale as you raise, inhale as you lower. Avoid holding your breath."];
TIPS["Incline Treadmill Walk"]=["Set incline to 8-12% and speed to 3.0-4.0 mph. Hold handrails only for balance, not to support your weight.","Walk with a natural gait, landing mid-foot. Keep your posture tall — avoid leaning into the machine.","One of the best fat-burning, joint-friendly cardio options. Elevates heart rate without impact stress on knees.","Target heart rate zone: 60-70% of max. For you, around 120-130 bpm."];
TIPS["Chest Press Machine (heavy)"]=["Same setup as regular chest press. On heavy days, warm up with 2 light sets before your working sets.","Use a 3-second lowering phase. Heavy weights with slow negatives trigger maximum muscle fiber recruitment.","On heavy days, keep reps at 5-6. If you hit 6 clean reps, add 5 lbs next session — that is progressive overload.","Rest 2-3 minutes between heavy sets. Full recovery is essential for strength work."];
TIPS["Shoulder Press Machine (heavy)"]=["Warm up with 2 lighter sets. On heavy sets range of motion can be slightly shorter — stop just below ear height.","Keep core extra braced on heavy presses. Without it, heavy overhead work compresses the lumbar spine.","6-8 reps here. Heavy shoulder pressing should be done early in the session when you are freshest.","If you feel shoulder clicking or pinching, stop and reduce weight. Pain with overhead pressing needs attention."];
TIPS["Tricep Pushdown"]=["Same mechanics as cable pushdown. On strength days, go slightly heavier with 8 reps.","Keep strict form — no elbow drift. As weight increases the temptation to let elbows flare grows.","A V-bar allows slightly more weight. A rope allows a wider range of motion.","Finish with a full squeeze at the bottom on every rep — this builds the tricep horseshoe shape."];
TIPS["Overhead Press"]=["Stand with feet shoulder-width apart. Hold the bar at shoulder height, grip just outside shoulder-width.","Press straight up, slightly back at the top. Keep core braced and glutes squeezed.","Avoid pressing in front of your face — this puts bar path forward of center of gravity.","Lower to chin height. For men over 50, full depth overhead pressing can stress the shoulder capsule."];
TIPS["Barbell Row"]=["Hinge forward 45 degrees with a flat back, bar hanging below your chest. Grip slightly wider than shoulder-width.","Pull bar to your lower sternum, driving elbows back and squeezing mid-back at the top.","Keep lower back flat throughout. If you feel strain, reduce weight or switch to machine row.","Control the lowering phase fully. Letting the bar drop with gravity eliminates the eccentric contraction."];
TIPS["Goblet Squat"]=["Hold a dumbbell vertically at your chest. Feet shoulder-width, toes out 30 degrees. Keep weight close to your body.","Sit back and down between your knees — elbows track inside the knees at the bottom. Chest stays tall.","This is a knee-friendly squat variation — the goblet position keeps torso upright, reducing knee stress.","Go only as deep as your mobility and knee comfort allow. Parallel or slightly above is fine."];
TIPS["Step Up"]=["Use a box or bench at a height where your knee is at 90 degrees when your foot is on top.","Drive through the heel of the elevated foot to stand up. Avoid pushing off the back foot.","Step up slowly and with control. This unilateral movement is excellent for balance and hip stability.","Start with bodyweight only. Add dumbbells once form is solid. Keep step height moderate given your knee history."];
TIPS["Ab Machine"]=["Adjust the seat so the pads rest on your upper chest and shoulders. Keep lower back pressed against the seat.","Crunch forward by rounding the upper back, not by pulling with neck or hip flexors.","Squeeze at full contraction and hold for 1 second. Return slowly with control.","Keep weight moderate and reps high at 15+. Heavy ab work can contribute to lower back issues over time."];
TIPS["Russian Twist"]=["Sit with knees bent, feet can be elevated for more difficulty. Lean back 45 degrees and hold a weight.","Rotate side to side from the torso, touching the weight to the ground on each side. Keep chest up.","Avoid pulling with your arms — the rotation comes from your obliques. Breathe out on each twist.","If you have lower back issues, keep feet on floor and reduce rotation range."];
TIPS["Dead Bug"]=["Lie on your back, arms extended to ceiling, knees bent at 90 degrees in the air.","Slowly lower right arm overhead and extend left leg simultaneously — keep lower back pressed to the floor.","The lower back must stay flat. If it arches, you have gone too far — reduce your range.","Return and alternate sides. This is a core stability exercise. Slow and controlled is everything."];
TIPS["Cable Fly"]=["Set pulleys at chest height. Step forward to create tension. Start with arms wide, slight elbow bend.","Bring hands together in front of chest in a hugging motion. Squeeze chest hard at the center.","Control the return — don't let cables yank arms back. Keep constant tension throughout.","Great finishing move. Lighter weight, higher reps (12-15), focus on the squeeze."];
TIPS["Pec Deck"]=["Adjust seat so handles are at chest height. Keep slight bend in elbows throughout.","Bring pads together in front of chest, squeezing pecs at full contraction.","Control the return — stop when you feel a stretch, don't overextend behind the shoulder line.","Keep shoulders down and back, chest proud. Don't let shoulders roll forward."];
TIPS["Assisted Pull-Up"]=["Set counterweight — higher weight means more assistance. Grip bar slightly wider than shoulders.","Pull until chin clears the bar, driving elbows down and back.","Lower with control over 2-3 seconds. The negative is where you build strength to do unassisted pull-ups.","As you get stronger, reduce the counterweight gradually. Track your progress."];
TIPS["Cable Curl"]=["Stand facing low pulley, grip the bar underhand. Pin elbows to sides.","Curl up to shoulder height, squeezing bicep at the top.","Lower under control — the cable provides constant tension unlike dumbbells.","Keep torso still. No swinging or leaning back."];

var defaultTip=["Set up properly before each rep — adjust the machine to fit your body, not the other way around.","Focus on the target muscle. Slow controlled reps beat heavy sloppy reps every time.","Control the lowering phase over 2-3 seconds. This eccentric phase builds more muscle than the lifting phase.","If you feel joint pain rather than muscle burn, stop immediately. Distinguish productive discomfort from injury signals."];

// ── STATE ──────────────────────────────────────────────────
var rows=[];
var timerInterval=null,timerRemaining=0,timerTotal=0,activeTimerRowId=null;

// ── HELPERS ────────────────────────────────────────────────
function getTodayDate(){return new Date().toISOString().split("T")[0];}
function getTodayDay(){return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];}
function uid(){return "r"+Date.now()+Math.floor(Math.random()*99999);}
function loadLocal(k,d){try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getHistory(){return loadLocal(HISTORY_KEY,{});}
function stripStar(name){return name?name.replace(/^★ /,""):name;}
function saveHistory(name,sets){var h=getHistory();h[stripStar(name)]=sets.map(function(s){return{weight:String(s.weight||""),reps:String(s.reps||"")};});saveLocal(HISTORY_KEY,h);}
function persist(){saveLocal(STORAGE_KEY,rows);}

function getDefaultSets(name){
  var cleanName=stripStar(name);
  var hist=getHistory();
  if(hist[cleanName]){
    return hist[cleanName].map(function(s){return{weight:String(s.weight||""),reps:String(s.reps||""),done:false};});
  }
  var ws=DEFAULTS[cleanName];
  var rs=DEFAULT_REPS[cleanName];
  if(ws&&rs){
    var len=Math.max(ws.length,rs.length);
    var arr=[];
    for(var i=0;i<len;i++){arr.push({weight:String(ws[i]||0),reps:String(rs[i]||0),done:false});}
    return arr;
  }
  var arr2=[];
  for(var j=0;j<MAX_SETS;j++){arr2.push({weight:"",reps:"",done:false});}
  return arr2;
}

function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── ROW FACTORY ────────────────────────────────────────────
function emptyRow(){
  var last=rows[rows.length-1];
  var arr=[];
  for(var i=0;i<MAX_SETS;i++){arr.push({weight:"",reps:"",done:false});}
  return{id:uid(),date:getTodayDate(),day:last?last.day:getTodayDay(),
    group:last?last.group:"",exercise:"",customExercise:"",
    sets:arr,notes:"",synced:false};
}

// ── INIT ───────────────────────────────────────────────────
function init(){
  var now=new Date();
  document.getElementById("dateNum").textContent=now.getDate();
  document.getElementById("dateMon").textContent=now.toLocaleString("default",{month:"short"}).toUpperCase();
  document.getElementById("dayPill").textContent=getTodayDay().toUpperCase()+" - "+getTodayDate();
  var saved=loadLocal(STORAGE_KEY,[]);
  rows=saved.length?saved:[emptyRow()];
  renderAll();
  updateFooter();
}

// ── RENDER ─────────────────────────────────────────────────
function renderAll(){
  var list=document.getElementById("rowList");
  list.innerHTML="";
  for(var i=0;i<rows.length;i++){list.appendChild(buildCard(rows[i],i));}
}

function buildCard(row,idx){
  var color=GROUP_COLORS[row.group]||"#555";
  var displayName=row.exercise==="__custom__"?row.customExercise:stripStar(row.exercise);
  var hasEx=(row.exercise&&row.exercise!=="__custom__")||row.customExercise;
  var doneCount=0;
  for(var d=0;d<row.sets.length;d++){if(row.sets[d].done)doneCount++;}
  var isTimerRow=activeTimerRowId===row.id;
  var target=TARGETS[stripStar(row.exercise)]||"";

  var setsHtml="";
  for(var si=0;si<row.sets.length;si++){
    var s=row.sets[si];
    setsHtml+='<div class="set-block'+(s.done?" done":"")+'" id="sb-'+row.id+'-'+si+'">'
      +'<div class="set-top">'
      +'<div class="set-num" style="background:'+(s.done?"#2a2a30":color)+'">'+(s.done?"&#10003;":(si+1))+'</div>'
      +'<div class="set-inputs">'
      +'<div class="set-field">'
      +'<div class="set-field-lbl">Weight lbs</div>'
      +'<input class="set-input'+(s.done?" set-input-done":"")+'" type="number" inputmode="decimal" value="'+escHtml(s.weight)+'" placeholder="-"'
      +' data-rowid="'+row.id+'" data-si="'+si+'" data-field="weight" oninput="onSetInput(this)"/>'
      +'</div>'
      +'<div class="set-field">'
      +'<div class="set-field-lbl">Reps</div>'
      +'<input class="set-input'+(s.done?" set-input-done":"")+'" type="number" inputmode="numeric" value="'+escHtml(s.reps)+'" placeholder="-"'
      +' data-rowid="'+row.id+'" data-si="'+si+'" data-field="reps" oninput="onSetInput(this)"/>'
      +'</div>'
      +'</div>'
      +'</div>'
      +'<div class="set-done-strip">'
      +'<button class="done-btn" style="background:'+(s.done?color+"33":"transparent")+';color:'+(s.done?color:"#aaa")+'"'
      +' data-rowid="'+row.id+'" data-si="'+si+'" onclick="onDoneBtn(this)">'
      +(s.done?"&#10003; SET DONE  TAP TO UNDO":"TAP WHEN SET DONE")
      +'</button>'
      +'</div>'
      +'</div>';
  }

  var card=document.createElement("div");
  card.className="card";
  card.id="card-"+row.id;
  card.style.borderColor=row.synced?"#1f301f":color+"55";

  var html='<div class="card-bar" style="background:'+color+'18">'
    +'<div class="card-index" style="background:'+color+'">'+(idx+1)+'</div>'
    +'<div class="card-title">'
    +(displayName?'<strong>'+escHtml(displayName)+'</strong>':'<span class="ph">New Exercise</span>')
    +(hasEx?'<span class="prog-pill" style="background:'+color+'33;color:'+color+'" id="pp-'+row.id+'">'+doneCount+'/'+MAX_SETS+'</span>':"")
    +'</div>'
    +(hasEx?'<button class="tip-btn" style="border-color:'+color+'66;color:'+color+'" data-ex="'+escHtml(displayName)+'" data-grp="'+escHtml(row.group)+'" onclick="onTipBtn(this)">&#128161;</button>':"")
    +(row.synced?'<span class="sync-badge">done</span>':"")
    +'<button class="remove-btn" data-rowid="'+row.id+'" onclick="onRemove(this)">×</button>'
    +'</div>'
    +'<div class="card-body">'
    +'<div class="two-col">'
    +'<div class="field-wrap"><div class="field-label">Day</div><div class="sel-wrap">'
    +'<select data-rowid="'+row.id+'" data-field="day" onchange="onSelect(this)">';
  for(var di=0;di<DAY_OPTIONS.length;di++){
    html+='<option value="'+DAY_OPTIONS[di]+'"'+(row.day===DAY_OPTIONS[di]?" selected":"")+'>'+DAY_OPTIONS[di]+'</option>';
  }
  html+='</select><span class="sel-arrow" style="color:'+color+'">v</span></div></div>'
    +'<div class="field-wrap"><div class="field-label">Group</div><div class="sel-wrap">'
    +'<select data-rowid="'+row.id+'" data-field="group" onchange="onSelect(this)">'
    +'<option value="">Select</option>';
  for(var gi=0;gi<GROUP_OPTIONS.length;gi++){
    html+='<option value="'+GROUP_OPTIONS[gi]+'"'+(row.group===GROUP_OPTIONS[gi]?" selected":"")+'>'+GROUP_OPTIONS[gi]+'</option>';
  }
  html+='</select><span class="sel-arrow" style="color:'+color+'">v</span></div></div>'
    +'</div>'
    +'<div class="field-wrap"><div class="field-label">Exercise</div><div class="sel-wrap">'
    +'<select data-rowid="'+row.id+'" data-field="exercise" onchange="onSelect(this)"'
    +(row.group?"":" disabled")+' style="color:'+(row.exercise?"#fff":"#666")+'">'
    +'<option value="">'+(row.group?"Select exercise":"Pick group first")+'</option>';
  var exList=EXERCISE_MAP[row.group]||[];
  for(var ei=0;ei<exList.length;ei++){
    html+='<option value="'+escHtml(exList[ei])+'"'+(row.exercise===exList[ei]?" selected":"")+'>'+escHtml(exList[ei])+'</option>';
  }
  html+='<option value="__custom__"'+(row.exercise==="__custom__"?" selected":"")+'>+ Custom exercise</option>'
    +'</select><span class="sel-arrow" style="color:'+color+'">v</span></div>'
    +(row.exercise==="__custom__"?'<input class="custom-input" style="border-color:'+color+'66" placeholder="Type exercise name..." value="'+escHtml(row.customExercise)+'" data-rowid="'+row.id+'" data-field="customExercise" oninput="onSelect(this)"/>':"")
    +'</div>';

  if(hasEx){
    if(target){
      html+='<div class="target-badge">Target: <span>'+escHtml(target)+'</span></div>';
    }
    html+='<div class="rest-row"><span class="field-label">Rest</span><div class="rest-btns">';
    var restOpts=[["1m",60],["90s",90],["2m",120],["3m",180]];
    for(var ri=0;ri<restOpts.length;ri++){
      html+='<button class="rest-btn" style="background:'+(isTimerRow?color:"#1a1a1f")+';border-color:'+color+'77;color:'+(isTimerRow?"#fff":color)+'"'
        +' data-secs="'+restOpts[ri][1]+'" data-label="'+escHtml(displayName||"Exercise")+'" data-rowid="'+row.id+'" onclick="onRestBtn(this)">'+restOpts[ri][0]+'</button>';
    }
    html+='</div></div>'
      +'<div class="sets-wrap">'+setsHtml+'</div>';
  }

  html+='<input class="notes-input" placeholder="Notes (optional)..." value="'+escHtml(row.notes)+'" data-rowid="'+row.id+'" data-field="notes" oninput="onSelect(this)"/>'
    +'</div>';

  card.innerHTML=html;
  return card;
}

function rerenderCard(rowId){
  var row=null;
  for(var i=0;i<rows.length;i++){if(rows[i].id===rowId){row=rows[i];break;}}
  if(!row) return;
  var idx=rows.indexOf(row);
  var old=document.getElementById("card-"+rowId);
  if(old) old.replaceWith(buildCard(row,idx));
}

// ── EVENT HANDLERS ─────────────────────────────────────────
function onSelect(el){
  var rowId=el.dataset.rowid,field=el.dataset.field,value=el.value;
  var row=null;
  for(var i=0;i<rows.length;i++){if(rows[i].id===rowId){row=rows[i];break;}}
  if(!row) return;
  if(field==="group"){
    row.group=value;row.exercise="";row.customExercise="";
    var arr=[];
    for(var j=0;j<MAX_SETS;j++){arr.push({weight:"",reps:"",done:false});}
    row.sets=arr;
  } else if(field==="exercise"&&value&&value!=="__custom__"){
    row.exercise=value;
    row.sets=getDefaultSets(value);
  } else {
    row[field]=value;
  }
  row.synced=false;persist();rerenderCard(rowId);updateFooter();
}

function onSetInput(el){
  var rowId=el.dataset.rowid;
  var si=parseInt(el.dataset.si,10);
  var field=el.dataset.field;
  var row=null;
  for(var i=0;i<rows.length;i++){if(rows[i].id===rowId){row=rows[i];break;}}
  if(!row) return;
  row.sets[si][field]=el.value;
  
  // Propagate value forward to subsequent sets that haven't been marked done
  if(el.value){
    for(var j=si+1;j<row.sets.length;j++){
      if(!row.sets[j].done){
        row.sets[j][field]=el.value;
        // Update DOM directly
        var block=document.getElementById("sb-"+rowId+"-"+j);
        if(block){
          var inputs=block.querySelectorAll("input.set-input");
          for(var k=0;k<inputs.length;k++){
            if(inputs[k].dataset.field===field){
              inputs[k].value=el.value;
            }
          }
        }
      }
    }
  }
  row.synced=false;persist();updateFooter();
}

function onDoneBtn(el){
  var rowId=el.dataset.rowid,si=parseInt(el.dataset.si,10);
  var row=null;
  for(var i=0;i<rows.length;i++){if(rows[i].id===rowId){row=rows[i];break;}}
  if(!row) return;
  row.sets[si].done=!row.sets[si].done;
  var name=row.exercise==="__custom__"?row.customExercise:row.exercise;
  if(name) saveHistory(name,row.sets);
  persist();
  // Surgical DOM update — no full rerender needed
  var sb=document.getElementById("sb-"+rowId+"-"+si);
  var color=GROUP_COLORS[row.group]||"#555";
  var s=row.sets[si];
  if(sb){
    sb.className="set-block"+(s.done?" done":"");
    var numEl=sb.querySelector(".set-num");
    if(numEl){numEl.innerHTML=s.done?"&#10003;":(si+1);numEl.style.background=s.done?"#2a2a30":color;}
    var inputs=sb.querySelectorAll(".set-input");
    for(var k=0;k<inputs.length;k++){inputs[k].className="set-input"+(s.done?" set-input-done":"");}
    var btn=sb.querySelector(".done-btn");
    if(btn){
      btn.style.background=s.done?color+"22":"transparent";
      btn.style.color=s.done?color:"#555";
      btn.innerHTML=s.done?"&#10003; SET DONE  TAP TO UNDO":"TAP WHEN SET DONE";
    }
  }
  var pill=document.getElementById("pp-"+rowId);
  if(pill){
    var cnt=0;for(var m=0;m<row.sets.length;m++){if(row.sets[m].done)cnt++;}
    pill.textContent=cnt+"/"+MAX_SETS;
  }
  updateFooter();
}

function onRemove(el){
  if(rows.length<=1) return;
  var rid=el.dataset.rowid;
  var newRows=[];
  for(var i=0;i<rows.length;i++){if(rows[i].id!==rid)newRows.push(rows[i]);}
  rows=newRows;
  persist();renderAll();updateFooter();
}
function onRestBtn(el){startTimer(parseInt(el.dataset.secs,10),el.dataset.label,el.dataset.rowid);}
function onTipBtn(el){openTip(el.dataset.ex,el.dataset.grp);}
function addRow(){rows.push(emptyRow());persist();renderAll();updateFooter();setTimeout(function(){window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});},50);}

// ── SYNC ───────────────────────────────────────────────────
function updateFooter(){
  var n=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.synced&&(r.exercise||r.customExercise))n++;
  }
  document.getElementById("syncInfo").innerHTML=n>0
    ?'<span style="color:#F5A623">&#9899; '+n+' unsaved</span>'
    :'<span style="color:#3DBF7F">&#9899; All saved</span>';
  var btn=document.getElementById("syncBtn");
  btn.style.borderColor="#4F8EF7";btn.style.color="#4F8EF7";btn.style.background="#1a1a2a";
}

function handleSync(){
  var unsynced=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.synced&&(r.exercise||r.customExercise))unsynced.push(r);
  }
  var btn=document.getElementById("syncBtn");
  if(!unsynced.length){btn.textContent="Nothing new";setTimeout(function(){btn.textContent="Save to Sheets";updateFooter();},2500);return;}
  btn.textContent="Saving...";btn.disabled=true;
  var values=[];
  for(var j=0;j<unsynced.length;j++){
    var u=unsynced[j];
    values.push([
      u.date,u.day,u.group,u.exercise==="__custom__"?u.customExercise:stripStar(u.exercise),
      u.sets[0]?u.sets[0].weight||"":"",u.sets[0]?u.sets[0].reps||"":"",
      u.sets[1]?u.sets[1].weight||"":"",u.sets[1]?u.sets[1].reps||"":"",
      u.sets[2]?u.sets[2].weight||"":"",u.sets[2]?u.sets[2].reps||"":"",
      u.sets[3]?u.sets[3].weight||"":"",u.sets[3]?u.sets[3].reps||"":"",
      u.notes||""
    ]);
  }
  fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({rows:values})})
  .then(function(){
    for(var k=0;k<unsynced.length;k++){
      var uid=unsynced[k].id;
      for(var m=0;m<rows.length;m++){if(rows[m].id===uid)rows[m].synced=true;}
    }
    persist();renderAll();
    btn.textContent="Saved!";btn.style.color="#3DBF7F";btn.style.borderColor="#3DBF7F";btn.style.background="#1a3a1a";
    setTimeout(function(){btn.textContent="Save to Sheets";btn.disabled=false;updateFooter();},3000);
  })
  .catch(function(){
    btn.textContent="Failed - retry";btn.style.color="#E05C5C";btn.style.borderColor="#E05C5C";btn.disabled=false;
    setTimeout(function(){btn.textContent="Save to Sheets";updateFooter();},4000);
  });
}

// ── TIMER ─────────────────────────────────────────────────
function startTimer(secs,label,rowId){
  clearInterval(timerInterval);
  timerRemaining=secs;timerTotal=secs;activeTimerRowId=rowId;
  document.getElementById("timerLabel").textContent=label;
  document.getElementById("timerOverlay").style.display="flex";
  tick();
  timerInterval=setInterval(function(){timerRemaining--;if(timerRemaining<=0){timerRemaining=0;clearInterval(timerInterval);}tick();},1000);
  rerenderCard(rowId);
}
function tick(){
  var min=Math.floor(timerRemaining/60),sec=timerRemaining%60;
  document.getElementById("timerText").textContent=min+":"+(sec<10?"0":"")+sec;
  var pct=timerTotal>0?timerRemaining/timerTotal:0;
  var circ=2*Math.PI*60;
  document.getElementById("timerArc").setAttribute("stroke-dashoffset",circ*(1-pct));
  document.getElementById("timerArc").setAttribute("stroke",pct>0.4?"#3DBF7F":pct>0.15?"#F5A623":"#E05C5C");
  document.getElementById("timerSub").textContent=timerRemaining===0?"REST DONE":"RESTING";
}
function cancelTimer(){
  clearInterval(timerInterval);
  document.getElementById("timerOverlay").style.display="none";
  if(activeTimerRowId){rerenderCard(activeTimerRowId);activeTimerRowId=null;}
}

// ── TECHNIQUE TIPS ─────────────────────────────────────────
function openTip(exName,group){
  var overlay=document.getElementById("tipOverlay");
  var titleEl=document.getElementById("tipTitle");
  var bodyEl=document.getElementById("tipBody");
  var cleanName=stripStar(exName);
  
  titleEl.textContent=cleanName||"Exercise Tips";
  overlay.style.display="flex";
  
  var emoji=GROUP_EMOJI[group]||"💪";
  var tipLines=TIPS[cleanName];
  if(!tipLines||tipLines.length===0){
    tipLines=defaultTip;
  }
  
  var linesHtml="";
  for(var i=0;i<tipLines.length;i++){
    linesHtml+='<div class="tip-line"><span class="tip-bullet">›</span><span>'+escHtml(tipLines[i])+'</span></div>';
  }
  bodyEl.innerHTML='<div class="tip-emoji">'+emoji+'</div><div class="tip-content">'+linesHtml+'</div>';
}
function closeTip(){document.getElementById("tipOverlay").style.display="none";}
document.addEventListener("keydown",function(e){if(e.key==="Escape"){cancelTimer();closeTip();}});

try{init();}catch(err){document.getElementById("rowList").innerHTML='<div style="color:#E05C5C;padding:20px;font-size:13px">Error: '+err.message+'</div>';}
</script>
