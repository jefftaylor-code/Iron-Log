<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Iron Log"/>
  <meta name="description" content="Jeff's 5-Day Gym Workout Tracker"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Iron Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --bg2: #111114;
      --bg3: #141416;
      --border: #1e1e24;
      --border2: #2a2a30;
      --text: #ffffff;
      --text2: #888888;
      --text3: #444444;
      --push: #4F8EF7;
      --pull: #E05C5C;
      --legs: #F5A623;
      --upper: #A855F7;
      --cardio: #3DBF7F;
      --core: #3DBF7F;
      --success: #3DBF7F;
      --warn: #F5A623;
      --danger: #E05C5C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }
    select, input, button { font-family: 'DM Sans', sans-serif; }
    select { appearance: none; -webkit-appearance: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* ── LAYOUT ── */
    #app { padding-bottom: 90px; }

    /* ── HEADER ── */
    .header { display:flex; justify-content:space-between; align-items:flex-start; padding:22px 16px 8px; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:5px; line-height:1; color:var(--text); }
    .header-sub { font-size:10px; color:var(--text3); letter-spacing:2px; margin-top:3px; text-transform:uppercase; }
    .date-badge { text-align:center; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:6px 14px; }
    .date-num { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; }
    .date-mon { font-size:10px; color:var(--text3); letter-spacing:2px; margin-top:1px; }
    .day-pill { margin:0 16px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:11px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; }

    /* ── CARDS ── */
    .row-list { padding:0 12px; display:flex; flex-direction:column; gap:12px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; overflow:hidden; animation:fadeIn 0.25s ease; }
    .card-bar { display:flex; align-items:center; gap:8px; padding:9px 12px; }
    .card-index { width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; transition:background 0.2s; }
    .card-title { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; gap:6px; }
    .card-title strong { color:var(--text); font-weight:600; }
    .card-title .placeholder { color:var(--text3); }
    .progress-pill { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:700; flex-shrink:0; }
    .tip-btn { background:none; border:1px solid; border-radius:6px; font-size:13px; padding:3px 7px; cursor:pointer; flex-shrink:0; transition:opacity 0.15s; }
    .tip-btn:active { opacity:0.6; }
    .sync-badge { font-size:10px; color:var(--success); background:#1a3a1a; padding:2px 7px; border-radius:5px; flex-shrink:0; }
    .remove-btn { background:none; border:none; color:#2a2a30; cursor:pointer; font-size:16px; padding:2px 4px; flex-shrink:0; }
    .remove-btn:active { color:var(--danger); }
    .card-body { padding:10px 12px 12px; display:flex; flex-direction:column; gap:10px; }

    /* ── FIELDS ── */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .field-wrap { display:flex; flex-direction:column; gap:4px; }
    .field-label { font-size:9px; color:var(--text3); letter-spacing:1.5px; font-weight:700; text-transform:uppercase; }
    .sel-wrap { position:relative; }
    .sel-wrap select { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-size:13px; padding:8px 28px 8px 10px; cursor:pointer; }
    .sel-wrap select:disabled { opacity:0.4; cursor:not-allowed; }
    .sel-arrow { position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:11px; pointer-events:none; }
    .custom-input { margin-top:6px; width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-size:13px; padding:8px 10px; outline:none; }

    /* ── REST TIMER ── */
    .rest-row { display:flex; align-items:center; gap:10px; }
    .rest-btns { display:flex; gap:5px; flex:1; }
    .rest-btn { flex:1; border:1px solid; border-radius:6px; font-size:11px; font-weight:700; padding:7px 0; cursor:pointer; letter-spacing:0.5px; transition:background 0.15s, color 0.15s; }
    .rest-btn:active { opacity:0.7; }

    /* ── SETS ── */
    .sets-wrap { display:flex; flex-direction:column; gap:5px; }
    .sets-head { display:flex; align-items:center; gap:6px; font-size:9px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; padding-bottom:2px; }
    .sets-head span:nth-child(1) { width:28px; }
    .sets-head span:nth-child(2),
    .sets-head span:nth-child(3) { flex:1; text-align:center; }
    .sets-head span:nth-child(4) { width:36px; text-align:center; }
    .set-row { display:flex; align-items:center; gap:6px; transition:opacity 0.2s; }
    .set-row.done { opacity:0.45; }
    .set-num { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; transition:background 0.2s; }
    .set-input { flex:1; background:var(--bg); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-size:16px; padding:8px 6px; text-align:center; outline:none; transition:border-color 0.2s, text-decoration 0.2s; }
    .set-input.done { text-decoration:line-through; border-color:var(--border); color:var(--text3); }
    .done-btn { width:34px; height:34px; border:1px solid; border-radius:7px; font-size:15px; cursor:pointer; flex-shrink:0; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
    .done-btn:active { transform:scale(0.9); }
    .notes-input { background:transparent; border:none; border-top:1px solid var(--border); color:var(--text3); font-size:12px; padding:9px 0 0; outline:none; width:100%; }
    .notes-input::placeholder { color:#2a2a30; }

    /* ── ADD BTN ── */
    .add-btn { display:block; width:calc(100% - 24px); margin:14px 12px 0; background:var(--bg2); border:1px dashed var(--border2); border-radius:10px; color:var(--text3); font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; padding:14px; cursor:pointer; transition:border-color 0.2s, color 0.2s; }
    .add-btn:active { color:var(--text2); border-color:var(--text3); }

    /* ── SYNC FOOTER ── */
    .sync-footer { position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:12px 16px; z-index:100; }
    .sync-info { font-size:12px; }
    .sync-btn { border:1px solid; border-radius:9px; font-size:12px; font-weight:700; padding:10px 18px; cursor:pointer; letter-spacing:0.5px; transition:all 0.2s; }
    .sync-btn:active { opacity:0.7; }

    /* ── OVERLAYS ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:flex; align-items:center; justify-content:center; z-index:9999; padding:16px; animation:fadeIn 0.15s ease; }

    /* ── TIMER ── */
    .timer-box { background:var(--bg2); border:1px solid var(--border2); border-radius:22px; padding:30px 44px; text-align:center; animation:slideUp 0.2s ease; }
    .timer-top-label { font-size:11px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; max-width:220px; }
    .timer-sub { font-size:11px; color:var(--text3); letter-spacing:3px; text-transform:uppercase; margin:10px 0 18px; }
    .timer-dismiss { background:var(--bg3); border:1px solid var(--border2); color:var(--text2); padding:10px 26px; border-radius:9px; cursor:pointer; font-size:11px; letter-spacing:2px; font-weight:700; font-family:'DM Sans',sans-serif; }
    .timer-dismiss:active { opacity:0.7; }

    /* ── TECHNIQUE MODAL ── */
    .tip-box { background:var(--bg2); border:1px solid var(--border2); border-radius:18px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; animation:slideUp 0.2s ease; }
    .tip-header { display:flex; align-items:center; justify-content:space-between; padding:16px 16px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg2); z-index:1; }
    .tip-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
    .tip-close { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; padding:2px 6px; line-height:1; }
    .tip-loading { display:flex; flex-direction:column; align-items:center; padding:40px; }
    .spinner { width:32px; height:32px; border:3px solid var(--border2); border-top:3px solid var(--push); border-radius:50%; animation:spin 0.8s linear infinite; }
    .tip-loading p { color:var(--text3); font-size:12px; margin-top:10px; }
    .tip-img-wrap { display:flex; justify-content:center; padding:16px 16px 0; background:var(--bg); }
    .tip-img { width:100%; max-width:280px; border-radius:10px; object-fit:cover; }
    .tip-no-img { padding:20px; text-align:center; font-size:32px; background:var(--bg); }
    .tip-content { padding:14px 16px 20px; display:flex; flex-direction:column; gap:10px; }
    .tip-line { display:flex; gap:8px; font-size:13px; color:#ccc; line-height:1.55; }
    .tip-bullet { color:var(--push); font-weight:700; flex-shrink:0; margin-top:2px; }
    .tip-error { padding:20px 16px; font-size:13px; color:var(--text3); text-align:center; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <div>
      <div class="logo">IRON LOG</div>
      <div class="header-sub">Jeff's 5-Day Plan</div>
    </div>
    <div class="date-badge">
      <div class="date-num" id="dateNum"></div>
      <div class="date-mon" id="dateMon"></div>
    </div>
  </div>
  <div class="day-pill" id="dayPill"></div>
  <div class="row-list" id="rowList"></div>
  <button class="add-btn" onclick="addRow()">+ ADD EXERCISE</button>
</div>

<!-- SYNC FOOTER -->
<div class="sync-footer">
  <div class="sync-info" id="syncInfo"></div>
  <button class="sync-btn" id="syncBtn" onclick="handleSync()">📤 Save to Sheets</button>
</div>

<!-- TIMER OVERLAY -->
<div class="overlay" id="timerOverlay" style="display:none" onclick="cancelTimer()">
  <div class="timer-box" onclick="event.stopPropagation()">
    <div class="timer-top-label" id="timerLabel"></div>
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="60" fill="none" stroke="#1e1e24" stroke-width="9"/>
      <circle id="timerArc" cx="70" cy="70" r="60" fill="none" stroke="#3DBF7F"
        stroke-width="9" stroke-dasharray="376.99" stroke-dashoffset="0"
        stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear,stroke 0.5s"/>
      <text x="70" y="78" text-anchor="middle" fill="white" font-size="34"
        font-family="Bebas Neue" letter-spacing="2" id="timerText">0:00</text>
    </svg>
    <div class="timer-sub" id="timerSub">RESTING</div>
    <button class="timer-dismiss" onclick="cancelTimer()">DISMISS</button>
  </div>
</div>

<!-- TECHNIQUE MODAL -->
<div class="overlay" id="tipOverlay" style="display:none" onclick="closeTip()">
  <div class="tip-box" onclick="event.stopPropagation()">
    <div class="tip-header">
      <div class="tip-title" id="tipTitle"></div>
      <button class="tip-close" onclick="closeTip()">✕</button>
    </div>
    <div id="tipBody"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxv2Yzr6imw58OS4TxwPzWuMRCGaxFvgPevpt5br8hRw4wkrRLD_nzwcxhRsKUvkeN/exec";
const STORAGE_KEY = "ironLog_v3";
const HISTORY_KEY = "ironLog_history";
const MAX_SETS = 4;

const DAY_OPTIONS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const GROUP_OPTIONS = ["Push","Pull","Legs","Upper Strength","Cardio","Core"];
const GROUP_COLORS = { Push:"#4F8EF7", Pull:"#E05C5C", Legs:"#F5A623", "Upper Strength":"#A855F7", Cardio:"#3DBF7F", Core:"#3DBF7F" };
const GROUP_ICONS  = { Push:"🔵", Pull:"🔴", Legs:"🟠", "Upper Strength":"🟣", Cardio:"🟢", Core:"🟢" };

const EXERCISE_MAP = {
  Push:["Chest Press Machine","Incline Dumbbell Press","Shoulder Press Machine","Lateral Raise (Dumbbells)","Tricep Pushdown (Cable)","Overhead Tricep Extension","Cable Fly","Pec Deck"],
  Pull:["Lat Pulldown","Seated Cable Row","Machine Row","Face Pulls (Cable)","Dumbbell Curl","Hammer Curl","Assisted Pull-Up","Cable Curl"],
  Legs:["Leg Press","Romanian Deadlift (Dumbbells)","Leg Curl Machine","Leg Extension Machine","Calf Raise Machine","Hip Abductor Machine","Goblet Squat","Step Up"],
  "Upper Strength":["Chest Press Machine (heavy)","Lat Pulldown (heavy)","Shoulder Press Machine (heavy)","Machine Row (heavy)","Dumbbell Curl","Tricep Pushdown","Overhead Press","Barbell Row"],
  Cardio:["Incline Treadmill Walk","Treadmill Run","Elliptical","Stationary Bike","Stair Climber","Row Machine"],
  Core:["Plank","Cable Crunch","Seated Leg Raise","Ab Machine","Russian Twist","Dead Bug"]
};

// ExerciseDB free IDs (no API key needed for basic endpoint)
const EXERCISE_IDS = {
  "Chest Press Machine":"0009","Incline Dumbbell Press":"0011","Shoulder Press Machine":"0526",
  "Lateral Raise (Dumbbells)":"0034","Tricep Pushdown (Cable)":"0065","Overhead Tricep Extension":"0066",
  "Lat Pulldown":"0030","Seated Cable Row":"0383","Machine Row":"0355","Face Pulls (Cable)":"0332",
  "Dumbbell Curl":"0021","Hammer Curl":"0141","Assisted Pull-Up":"0018","Cable Curl":"0076",
  "Leg Press":"0365","Romanian Deadlift (Dumbbells)":"0189","Leg Curl Machine":"0362",
  "Leg Extension Machine":"0363","Calf Raise Machine":"1406","Hip Abductor Machine":"0285",
  "Plank":"0292","Cable Crunch":"0078","Seated Leg Raise":"0293",
  "Chest Press Machine (heavy)":"0009","Lat Pulldown (heavy)":"0030",
  "Shoulder Press Machine (heavy)":"0526","Machine Row (heavy)":"0355",
  "Tricep Pushdown":"0065","Overhead Press":"0052","Barbell Row":"0025","Dumbbell Curl":"0021"
};

// Fallback emoji thumbnails when image unavailable
const EX_EMOJI = {
  Push:"💪", Pull:"🏋️", Legs:"🦵", "Upper Strength":"⚡", Cardio:"🏃", Core:"🎯"
};

// ── STATE ────────────────────────────────────────────────
let rows = [];
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let activeTimerRowId = null;

// ── DATE HELPERS ─────────────────────────────────────────
function getTodayDate() { return new Date().toISOString().split("T")[0]; }
function getTodayDay()  { return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()]; }
function uid()          { return "r" + Date.now() + Math.floor(Math.random() * 10000); }

// ── LOCAL STORAGE ─────────────────────────────────────────
function loadLocal(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function getHistory()        { return loadLocal(HISTORY_KEY, {}); }
function saveHistory(name, sets) {
  const h = getHistory();
  h[name] = sets.map(s => ({ weight: s.weight, reps: s.reps }));
  saveLocal(HISTORY_KEY, h);
}
function getLastDefaults(name) {
  const h = getHistory();
  return h[name] ? h[name].map(s => ({ ...s, done: false })) : null;
}

// ── ROW FACTORY ───────────────────────────────────────────
function emptyRow() {
  const last = rows[rows.length - 1];
  return {
    id: uid(), date: getTodayDate(), day: last?.day || getTodayDay(),
    group: last?.group || "", exercise: "", customExercise: "",
    sets: Array.from({ length: MAX_SETS }, () => ({ weight:"", reps:"", done:false })),
    notes: "", synced: false
  };
}

function setsForExercise(name) {
  const last = getLastDefaults(name);
  return last || Array.from({ length: MAX_SETS }, () => ({ weight:"", reps:"", done:false }));
}

// ── PERSIST ───────────────────────────────────────────────
function persist() { saveLocal(STORAGE_KEY, rows); }

// ── INIT ─────────────────────────────────────────────────
function init() {
  // Date header
  const now = new Date();
  document.getElementById("dateNum").textContent = now.getDate();
  document.getElementById("dateMon").textContent = now.toLocaleString("default",{month:"short"}).toUpperCase();
  document.getElementById("dayPill").textContent = getTodayDay().toUpperCase() + " · " + getTodayDate();

  // Load saved rows
  const saved = loadLocal(STORAGE_KEY, []);
  rows = saved.length ? saved : [emptyRow()];
  renderAll();
  updateSyncFooter();
}

// ── RENDER ────────────────────────────────────────────────
function renderAll() {
  const list = document.getElementById("rowList");
  list.innerHTML = "";
  rows.forEach((row, idx) => list.appendChild(buildCard(row, idx)));
}

function buildCard(row, idx) {
  const color = GROUP_COLORS[row.group] || "#444";
  const displayName = row.exercise === "__custom__" ? row.customExercise : row.exercise;
  const hasEx = (row.exercise && row.exercise !== "__custom__") || row.customExercise;
  const doneCount = row.sets.filter(s => s.done).length;
  const isTimerRow = activeTimerRowId === row.id;

  const card = document.createElement("div");
  card.className = "card";
  card.id = "card-" + row.id;
  card.style.borderColor = row.synced ? "#1f301f" : color + "55";

  card.innerHTML = `
    <!-- BAR -->
    <div class="card-bar" style="background:${color}18">
      <div class="card-index" style="background:${row.synced?'#2a2a30':color}">${idx+1}</div>
      <div class="card-title">
        ${displayName
          ? `<strong>${esc(displayName)}</strong>`
          : `<span class="placeholder">New Exercise</span>`}
        ${hasEx ? `<span class="progress-pill" style="background:${color}33;color:${color}">${doneCount}/${MAX_SETS}</span>` : ""}
      </div>
      ${hasEx ? `<button class="tip-btn" style="border-color:${color}66;color:${color}" onclick="openTip('${esc(displayName)}','${esc(row.group)}')">💡</button>` : ""}
      ${row.synced ? `<span class="sync-badge">✓</span>` : ""}
      <button class="remove-btn" onclick="removeRow('${row.id}')">✕</button>
    </div>

    <!-- BODY -->
    <div class="card-body">
      <!-- Day + Group -->
      <div class="two-col">
        <div class="field-wrap">
          <div class="field-label">DAY</div>
          <div class="sel-wrap">
            <select onchange="updateRowField('${row.id}','day',this.value)">
              ${DAY_OPTIONS.map(d=>`<option value="${d}"${row.day===d?" selected":""}>${d}</option>`).join("")}
            </select>
            <span class="sel-arrow" style="color:${color}">▾</span>
          </div>
        </div>
        <div class="field-wrap">
          <div class="field-label">GROUP</div>
          <div class="sel-wrap">
            <select onchange="updateRowField('${row.id}','group',this.value)">
              <option value="">Select</option>
              ${GROUP_OPTIONS.map(g=>`<option value="${g}"${row.group===g?" selected":""}>${g}</option>`).join("")}
            </select>
            <span class="sel-arrow" style="color:${color}">▾</span>
          </div>
        </div>
      </div>

      <!-- Exercise -->
      <div class="field-wrap">
        <div class="field-label">EXERCISE</div>
        <div class="sel-wrap">
          <select onchange="updateRowField('${row.id}','exercise',this.value)" ${!row.group?"disabled":""} style="color:${row.exercise?'#fff':'#555'}">
            <option value="">${row.group?"Select exercise":"Pick group first"}</option>
            ${(EXERCISE_MAP[row.group]||[]).map(ex=>`<option value="${ex}"${row.exercise===ex?" selected":""}>${ex}</option>`).join("")}
            <option value="__custom__"${row.exercise==="__custom__"?" selected":""}>+ Custom exercise</option>
          </select>
          <span class="sel-arrow" style="color:${color}">▾</span>
        </div>
        ${row.exercise==="__custom__" ? `<input class="custom-input" style="border-color:${color}66" placeholder="Type exercise name..." value="${esc(row.customExercise)}" oninput="updateRowField('${row.id}','customExercise',this.value)"/>` : ""}
      </div>

      ${hasEx ? `
      <!-- Rest Timer -->
      <div class="rest-row">
        <span class="field-label">REST</span>
        <div class="rest-btns">
          ${[["1m",60],["90s",90],["2m",120],["3m",180]].map(([lbl,secs])=>`
            <button class="rest-btn" style="background:${isTimerRow?color:'#1a1a1f'};border-color:${color}77;color:${isTimerRow?'#fff':color}"
              onclick="startTimer(${secs},'${esc(displayName||"Exercise")}','${row.id}')">${lbl}</button>
          `).join("")}
        </div>
      </div>

      <!-- Sets -->
      <div class="sets-wrap">
        <div class="sets-head">
          <span>#</span><span>WEIGHT (lbs)</span><span>REPS</span><span>DONE</span>
        </div>
        ${row.sets.map((s,si) => `
          <div class="set-row${s.done?" done":""}" id="setrow-${row.id}-${si}">
            <div class="set-num" style="background:${s.done?'#2a2a30':color}">${s.done?"✓":si+1}</div>
            <input class="set-input${s.done?" done":""}" type="number" placeholder="lbs" value="${esc(s.weight)}"
              oninput="updateSet('${row.id}',${si},'weight',this.value)" inputmode="decimal"/>
            <input class="set-input${s.done?" done":""}" type="number" placeholder="reps" value="${esc(s.reps)}"
              oninput="updateSet('${row.id}',${si},'reps',this.value)" inputmode="numeric"/>
            <button class="done-btn" style="background:${s.done?color+'33':'#1a1a1f'};border-color:${s.done?color:color+'44'};color:${s.done?color:'#444'}"
              onclick="toggleSetDone('${row.id}',${si})">${s.done?"✓":"○"}</button>
          </div>
        `).join("")}
      </div>
      ` : ""}

      <!-- Notes -->
      <input class="notes-input" placeholder="Notes (optional)..." value="${esc(row.notes)}"
        oninput="updateRowField('${row.id}','notes',this.value)"/>
    </div>
  `;
  return card;
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function rerenderCard(rowId) {
  const row = rows.find(r => r.id === rowId);
  if (!row) return;
  const idx = rows.indexOf(row);
  const old = document.querySelector(`[id="card-${rowId}"]`);
  if (old) old.replaceWith(buildCard(row, idx));
}

// ── ROW MUTATIONS ─────────────────────────────────────────
function addRow() {
  rows.push(emptyRow());
  persist();
  renderAll();
  updateSyncFooter();
  // Scroll to bottom
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 50);
}

function removeRow(id) {
  if (rows.length <= 1) return;
  rows = rows.filter(r => r.id !== id);
  persist();
  renderAll();
  updateSyncFooter();
}

function updateRowField(id, field, value) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  if (field === "group") {
    row.group = value;
    row.exercise = "";
    row.customExercise = "";
    row.sets = Array.from({ length: MAX_SETS }, () => ({ weight:"", reps:"", done:false }));
  } else if (field === "exercise" && value && value !== "__custom__") {
    row.exercise = value;
    row.sets = setsForExercise(value);
  } else {
    row[field] = value;
  }
  row.synced = false;
  persist();
  rerenderCard(id);
  updateSyncFooter();
}

function updateSet(id, si, field, value) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row.sets[si][field] = value;
  row.synced = false;
  persist();
  // Update just the progress pill
  const pill = document.querySelector(`[id="card-${id}"] .progress-pill`);
  if (pill) { const done = row.sets.filter(s=>s.done).length; pill.textContent = `${done}/${MAX_SETS}`; }
  updateSyncFooter();
}

function toggleSetDone(id, si) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row.sets[si].done = !row.sets[si].done;
  // Save history
  const name = row.exercise === "__custom__" ? row.customExercise : row.exercise;
  if (name) saveHistory(name, row.sets);
  persist();
  rerenderCard(id);
  updateSyncFooter();
}

// ── SYNC ─────────────────────────────────────────────────
function updateSyncFooter() {
  const unsync = rows.filter(r => !r.synced && (r.exercise || r.customExercise));
  const info = document.getElementById("syncInfo");
  const btn = document.getElementById("syncBtn");
  if (unsync.length > 0) {
    info.innerHTML = `<span style="color:#F5A623">⬤ ${unsync.length} unsaved</span>`;
  } else {
    info.innerHTML = `<span style="color:#3DBF7F">⬤ All saved</span>`;
  }
  btn.style.borderColor = "#4F8EF7";
  btn.style.color = "#4F8EF7";
  btn.style.background = "#1a1a2a";
}

async function handleSync() {
  const unsynced = rows.filter(r => !r.synced && (r.exercise || r.customExercise));
  const btn = document.getElementById("syncBtn");
  if (!unsynced.length) {
    btn.textContent = "Nothing new";
    setTimeout(() => { btn.textContent = "📤 Save to Sheets"; updateSyncFooter(); }, 2500);
    return;
  }
  btn.textContent = "⏳ Saving...";
  btn.disabled = true;
  const values = unsynced.map(r => [
    r.date, r.day, r.group,
    r.exercise === "__custom__" ? r.customExercise : r.exercise,
    r.sets[0]?.weight||"", r.sets[0]?.reps||"",
    r.sets[1]?.weight||"", r.sets[1]?.reps||"",
    r.sets[2]?.weight||"", r.sets[2]?.reps||"",
    r.sets[3]?.weight||"", r.sets[3]?.reps||"",
    r.notes||""
  ]);
  try {
    await fetch(APPS_SCRIPT_URL, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ rows: values })
    });
    unsynced.forEach(u => { const r = rows.find(x=>x.id===u.id); if(r) r.synced=true; });
    persist();
    renderAll();
    btn.textContent = "✓ Saved to Sheets!";
    btn.style.color = "#3DBF7F";
    btn.style.borderColor = "#3DBF7F";
    btn.style.background = "#1a3a1a";
    setTimeout(() => { btn.textContent = "📤 Save to Sheets"; btn.disabled=false; updateSyncFooter(); }, 3000);
  } catch {
    btn.textContent = "✗ Failed — retry";
    btn.style.color = "#E05C5C";
    btn.style.borderColor = "#E05C5C";
    btn.style.background = "#3a1a1a";
    btn.disabled = false;
    setTimeout(() => { btn.textContent = "📤 Save to Sheets"; updateSyncFooter(); }, 4000);
  }
}

// ── TIMER ─────────────────────────────────────────────────
function startTimer(secs, label, rowId) {
  clearInterval(timerInterval);
  timerRemaining = secs;
  timerTotal = secs;
  activeTimerRowId = rowId;
  document.getElementById("timerLabel").textContent = label;
  document.getElementById("timerOverlay").style.display = "flex";
  renderTimerTick();
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) { timerRemaining = 0; clearInterval(timerInterval); }
    renderTimerTick();
  }, 1000);
  // Re-render rest buttons to show active state
  rerenderCard(rowId);
}

function renderTimerTick() {
  const min = Math.floor(timerRemaining / 60);
  const sec = timerRemaining % 60;
  document.getElementById("timerText").textContent = `${min}:${String(sec).padStart(2,"0")}`;
  const pct = timerTotal > 0 ? timerRemaining / timerTotal : 0;
  const circ = 2 * Math.PI * 60;
  document.getElementById("timerArc").setAttribute("stroke-dashoffset", circ * (1 - pct));
  document.getElementById("timerArc").setAttribute("stroke",
    pct > 0.4 ? "#3DBF7F" : pct > 0.15 ? "#F5A623" : "#E05C5C");
  document.getElementById("timerSub").textContent = timerRemaining === 0 ? "✓ REST DONE" : "RESTING";
}

function cancelTimer() {
  clearInterval(timerInterval);
  document.getElementById("timerOverlay").style.display = "none";
  if (activeTimerRowId) { rerenderCard(activeTimerRowId); activeTimerRowId = null; }
}

// ── TECHNIQUE TIPS ────────────────────────────────────────
async function openTip(exerciseName, group) {
  document.getElementById("tipTitle").textContent = exerciseName;
  document.getElementById("tipBody").innerHTML = `
    <div class="tip-loading"><div class="spinner"></div><p>Loading tips...</p></div>`;
  document.getElementById("tipOverlay").style.display = "flex";

  const exId = EXERCISE_IDS[exerciseName];
  const emoji = EX_EMOJI[group] || "💪";

  try {
    // Fetch AI tip and image in parallel
    const [tipText, imgUrl] = await Promise.all([
      fetchAITip(exerciseName),
      exId ? fetchExerciseGif(exId) : Promise.resolve(null)
    ]);

    const imgHtml = imgUrl
      ? `<div class="tip-img-wrap"><img class="tip-img" src="${imgUrl}" alt="${esc(exerciseName)}" onerror="this.parentElement.innerHTML='<div class=tip-no-img>${emoji}</div>'"/></div>`
      : `<div class="tip-no-img">${emoji}</div>`;

    const lines = tipText.split("\n").filter(l => l.trim());
    const tipHtml = `<div class="tip-content">${lines.map(l=>`
      <div class="tip-line">
        <span class="tip-bullet">›</span>
        <span>${esc(l.replace(/^[•\-\*]\s*/,""))}</span>
      </div>`).join("")}</div>`;

    document.getElementById("tipBody").innerHTML = imgHtml + tipHtml;
  } catch(e) {
    document.getElementById("tipBody").innerHTML =
      `<div class="tip-error">Could not load tips. Check your connection.</div>`;
  }
}

async function fetchAITip(exerciseName) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:"You are a certified personal trainer specializing in men over 50. Give concise, practical technique tips. Respond with exactly 4 bullet points using • symbol. Plain text only, no markdown headers or bold. Each point 1-2 sentences. Focus on: setup/position, key movement cue, common mistake to avoid, and one joint-protection tip for older lifters.",
      messages:[{ role:"user", content:`Technique tips for: ${exerciseName}` }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "Technique tips unavailable.";
}

async function fetchExerciseGif(exId) {
  try {
    const res = await fetch(`https://exercisedb.p.rapidapi.com/exercises/exercise/${exId}`, {
      headers:{ "x-rapidapi-key":"DEMO", "x-rapidapi-host":"exercisedb.p.rapidapi.com" }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.gifUrl || null;
  } catch { return null; }
}

function closeTip() {
  document.getElementById("tipOverlay").style.display = "none";
}

// ── KEYBOARD DISMISS ──────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { cancelTimer(); closeTip(); }
});

// ── START ─────────────────────────────────────────────────
init();
</script>
